name: expense_tracker
description: A professional expense tracker app with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  google_sign_in: ^6.2.2
  # State Management
  flutter_riverpod: ^2.6.1
  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  # Charts
  fl_chart: ^0.70.2
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  # Export
  pdf: ^3.11.2
  printing: ^5.13.5
  excel: ^4.0.6
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.1
  # Auth
  local_auth: ^2.3.0
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  # Routing
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
